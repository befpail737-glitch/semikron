<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 100 100">
  <defs>
    <pattern id="chip-pattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect x="2" y="2" width="16" height="16" fill="none" stroke="#E5E7EB" stroke-width="0.5"/>
      <circle cx="10" cy="10" r="2" fill="#D1D5DB" opacity="0.3"/>
    </pattern>
    
    <pattern id="circuit-pattern" x="0" y="0" width="15" height="15" patternUnits="userSpaceOnUse">
      <path d="M 0,7.5 L 15,7.5 M 7.5,0 L 7.5,15" stroke="#D1D5DB" stroke-width="0.3" opacity="0.5"/>
      <circle cx="7.5" cy="7.5" r="0.8" fill="#9CA3AF" opacity="0.6"/>
    </pattern>
    
    <pattern id="thermal-pattern" x="0" y="0" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 0,12.5 Q 12.5,5 25,12.5 T 12.5,25" fill="none" stroke="#FBBF24" stroke-width="0.4" opacity="0.4"/>
    </pattern>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#circuit-pattern)"/>
  <rect width="100%" height="100%" fill="url(#chip-pattern)" opacity="0.3"/>
  <rect width="100%" height="100%" fill="url(#thermal-pattern)" opacity="0.2"/>
</svg>