<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- EV Solution -->
  <!-- Battery -->
  <rect x="40" y="120" width="50" height="30" fill="#D1D5DB" stroke="#9CA3AF" stroke-width="2"/>
  <rect x="40" y="115" width="5" height="5" fill="#9CA3AF"/>
  
  <!-- Inverter -->
  <rect x="110" y="110" width="60" height="50" fill="#3B82F6" stroke="#1E3A8A" stroke-width="2"/>
  <text x="140" y="140" text-anchor="middle" fill="white" font-family="Arial" font-size="12">SKAI</text>
  
  <!-- Motor -->
  <circle cx="220" cy="135" r="25" fill="#10B981" stroke="#047857" stroke-width="2"/>
  <text x="220" y="140" text-anchor="middle" fill="white" font-family="Arial" font-size="10">Traction</text>
  
  <!-- Car body -->
  <rect x="190" y="100" width="80" height="20" fill="#6B7280" stroke="#4B5563" stroke-width="2"/>
  <circle cx="210" cy="165" r="10" fill="#1F2937"/>
  <circle cx="250" cy="165" r="10" fill="#1F2937"/>
  
  <!-- Power Flow -->
  <path d="M90,135 L110,135" stroke="#F87171" stroke-width="3" marker-end="url(#arrowhead)"/>
  <path d="M170,135 L200,135" stroke="#F87171" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Arrowhead definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F87171"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="150" y="190" text-anchor="middle" font-family="Arial" font-size="14" fill="#1E3A8A">EV Traction Solution</text>
</svg>