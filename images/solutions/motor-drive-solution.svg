<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Motor Drive Solution -->
  <!-- AC Supply -->
  <path d="M30,100 Q50,80 70,100 T110,100" fill="none" stroke="#60A5FA" stroke-width="3"/>
  
  <!-- Rectifier -->
  <rect x="110" y="80" width="40" height="40" fill="#FBBF24" stroke="#D97706" stroke-width="2"/>
  <text x="130" y="105" text-anchor="middle" fill="#1E3A8A" font-family="Arial" font-size="10">Rect</text>
  
  <!-- DC Link -->
  <rect x="160" y="90" width="20" height="20" fill="#D1D5DB" stroke="#9CA3AF" stroke-width="1"/>
  
  <!-- Inverter -->
  <rect x="190" y="80" width="40" height="40" fill="#3B82F6" stroke="#1E3A8A" stroke-width="2"/>
  <text x="210" y="105" text-anchor="middle" fill="white" font-family="Arial" font-size="10">IPM</text>
  
  <!-- Motor -->
  <circle cx="260" cy="100" r="20" fill="#10B981" stroke="#047857" stroke-width="2"/>
  <text x="260" y="105" text-anchor="middle" fill="white" font-family="Arial" font-size="10">Motor</text>
  
  <!-- Power Flow -->
  <path d="M70,100 L110,100" stroke="#F87171" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M150,100 L160,100" stroke="#F87171" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M180,100 L190,100" stroke="#F87171" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M230,100 L240,100" stroke="#F87171" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Arrowhead definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F87171"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="150" y="190" text-anchor="middle" font-family="Arial" font-size="14" fill="#1E3A8A">Motor Drive Solution</text>
</svg>