<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Solar Solution -->
  <!-- Solar Panels -->
  <rect x="40" y="60" width="60" height="40" fill="#3B82F6" stroke="#1E3A8A" stroke-width="1"/>
  <rect x="110" y="60" width="60" height="40" fill="#3B82F6" stroke="#1E3A8A" stroke-width="1"/>
  <rect x="180" y="60" width="60" height="40" fill="#3B82F6" stroke="#1E3A8A" stroke-width="1"/>
  
  <!-- Sun rays -->
  <line x1="150" y1="20" x2="140" y2="55" stroke="#F59E0B" stroke-width="2"/>
  <line x1="150" y1="20" x2="150" y2="55" stroke="#F59E0B" stroke-width="2"/>
  <line x1="150" y1="20" x2="160" y2="55" stroke="#F59E0B" stroke-width="2"/>
  
  <!-- Inverter -->
  <rect x="100" y="120" width="100" height="40" fill="#10B981" stroke="#047857" stroke-width="2"/>
  <text x="150" y="145" text-anchor="middle" fill="white" font-family="Arial" font-size="12">SEMiX</text>
  
  <!-- Power Lines -->
  <line x1="150" y1="100" x2="150" y2="120" stroke="#F87171" stroke-width="2"/>
  <line x1="150" y1="160" x2="150" y2="180" stroke="#60A5FA" stroke-width="2"/>
  <circle cx="150" cy="180" r="4" fill="#60A5FA"/>
  
  <!-- Title -->
  <text x="150" y="190" text-anchor="middle" font-family="Arial" font-size="14" fill="#1E3A8A">Solar Power Solution</text>
</svg>